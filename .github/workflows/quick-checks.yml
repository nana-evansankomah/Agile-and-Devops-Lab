name: Quick Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint

    - name: Lint backend
      run: |
        pylint backend/ --disable=all --enable=E,F

    - name: Run fast unit tests
      run: |
        pytest tests/test_ingestion.py tests/test_transformations.py tests/test_quality_monitoring.py tests/test_monitoring.py -v --tb=short
